name: Core local bridge benchmark
on:
  pull_request:
    paths:
      - "benchmarks/core_local_bridge_benchmark.py"
      - ".github/workflows/core-local-bridge.yml"
      - "src/eog/**"
  workflow_dispatch:
permissions:
  contents: read
jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: python -m pip install -e .
      - name: Run benchmark
        run: python benchmarks/core_local_bridge_benchmark.py --repeats 30 --seed 20260830 --output benchmark_results/core_local_bridge
      - name: Check outputs
        run: |
          test -s benchmark_results/core_local_bridge/core_local_bridge_results.csv
          test -s benchmark_results/core_local_bridge/core_local_bridge_auc.csv
          test -s benchmark_results/core_local_bridge/core_local_bridge_decision.json
      - name: Upload outputs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: core-local-bridge-benchmark
          path: benchmark_results/core_local_bridge
          if-no-files-found: error
