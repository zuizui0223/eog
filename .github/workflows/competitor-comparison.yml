name: Competitor comparison benchmark

on:
  pull_request:
  push:
    branches: [main]

jobs:
  benchmark:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install -e ".[dev]"
      - run: pytest tests/test_comparators.py
      - run: python benchmarks/competitor_comparison.py --output /tmp/competitor_comparison.json
      - name: Upload generated benchmark result
        uses: actions/upload-artifact@v4
        with:
          name: competitor-comparison-actual
          path: /tmp/competitor_comparison.json
      - name: Compare frozen result values
        run: |
          python - <<'PY'
          import json
          import math
          from pathlib import Path

          expected = json.loads(Path('benchmarks/expected/competitor_comparison.json').read_text())
          actual = json.loads(Path('/tmp/competitor_comparison.json').read_text())

          def compare(actual_value, expected_value, path='root'):
              if isinstance(expected_value, dict):
                  if not isinstance(actual_value, dict):
                      raise AssertionError(f'{path}: expected object, got {type(actual_value).__name__}')
                  if set(actual_value) != set(expected_value):
                      raise AssertionError(
                          f'{path}: key mismatch; actual={sorted(actual_value)}, expected={sorted(expected_value)}'
                      )
                  for key in expected_value:
                      compare(actual_value[key], expected_value[key], f'{path}.{key}')
                  return
              if isinstance(expected_value, list):
                  if not isinstance(actual_value, list) or len(actual_value) != len(expected_value):
                      raise AssertionError(f'{path}: list mismatch')
                  for index, (a_item, e_item) in enumerate(zip(actual_value, expected_value)):
                      compare(a_item, e_item, f'{path}[{index}]')
                  return
              if isinstance(expected_value, (int, float)) and not isinstance(expected_value, bool):
                  if not isinstance(actual_value, (int, float)) or isinstance(actual_value, bool):
                      raise AssertionError(f'{path}: expected numeric value, got {actual_value!r}')
                  if not math.isclose(float(actual_value), float(expected_value), rel_tol=1e-10, abs_tol=1e-9):
                      raise AssertionError(
                          f'{path}: actual={actual_value!r}, expected={expected_value!r}'
                      )
                  return
              if actual_value != expected_value:
                  raise AssertionError(f'{path}: actual={actual_value!r}, expected={expected_value!r}')

          compare(actual, expected)
          PY
