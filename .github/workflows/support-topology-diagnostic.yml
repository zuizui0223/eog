name: Support topology diagnostic

on:
  pull_request:
    paths:
      - 'src/eog/support_topology.py'
      - 'tests/test_support_topology.py'
      - '.github/workflows/support-topology-diagnostic.yml'

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install
        run: python -m pip install -e '.[dev]'
      - name: Capture pytest output
        run: |
          set +e
          pytest tests/test_support_topology.py -vv > support-topology-pytest.log 2>&1
          echo $? > support-topology-exit-code.txt
          exit 0
      - uses: actions/upload-artifact@v4
        with:
          name: support-topology-diagnostic
          path: |
            support-topology-pytest.log
            support-topology-exit-code.txt
