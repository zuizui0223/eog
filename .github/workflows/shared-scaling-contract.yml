name: Shared scaling contract

on:
  pull_request:
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: python -m pip install -e . pytest
      - name: Test comparative API
        run: python -m pytest tests/test_comparative.py
      - name: Run frozen shared scaling benchmark
        run: python benchmarks/shared_scaling_contract.py
      - name: Check decision
        run: python -c "import json; d=json.load(open('benchmark_results/shared_scaling/shared_scaling_decision.json')); assert d['passes_contract']"
      - name: Upload outputs
        uses: actions/upload-artifact@v4
        with:
          name: shared-scaling-contract
          path: benchmark_results/shared_scaling/
