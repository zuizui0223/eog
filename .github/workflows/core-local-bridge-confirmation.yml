name: Core local bridge confirmation

on:
  pull_request:
    paths:
      - "benchmarks/core_local_bridge_confirmation.py"
      - "docs/core_local_bridge_confirmation_protocol.md"
      - ".github/workflows/core-local-bridge-confirmation.yml"
      - "src/eog/**"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: python -m pip install -e .
      - name: Run independent confirmation
        run: |
          python benchmarks/core_local_bridge_confirmation.py \
            --repeats 15 \
            --seed 20260917 \
            --output benchmark_results/core_local_bridge_confirmation
      - name: Check outputs
        run: |
          test -s benchmark_results/core_local_bridge_confirmation/confirmation_results.csv
          test -s benchmark_results/core_local_bridge_confirmation/confirmation_auc.csv
          test -s benchmark_results/core_local_bridge_confirmation/confirmation_decision.json
      - name: Upload outputs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: core-local-bridge-confirmation
          path: benchmark_results/core_local_bridge_confirmation
          if-no-files-found: error
