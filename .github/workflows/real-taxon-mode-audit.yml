name: Real-taxon mode audit

on:
  pull_request:
    paths:
      - "benchmarks/real_taxon_mode_audit.py"
      - "benchmarks/real_taxon_pilot.py"
      - "benchmarks/mode_separation_comparators.py"
      - "benchmarks/real_taxon_pilot_manifest.csv"
      - ".github/workflows/real-taxon-mode-audit.yml"
      - "src/eog/**"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: python -m pip install -e ".[raster]"
      - name: Run frozen real-taxon mode audit
        run: |
          python benchmarks/real_taxon_mode_audit.py \
            --manifest benchmarks/real_taxon_pilot_manifest.csv \
            --output benchmark_results/real_taxon_mode_audit \
            --seed 20261015 \
            --minimum-n 60 \
            --minimum-eligible 4 \
            --stability-repeats 20
      - name: Check outputs
        run: |
          test -s benchmark_results/real_taxon_mode_audit/real_taxon_mode_summary.csv
          test -s benchmark_results/real_taxon_mode_audit/real_taxon_mode_stability.csv
          test -s benchmark_results/real_taxon_mode_audit/real_taxon_mode_decision.json
      - name: Upload outputs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: real-taxon-mode-audit
          path: benchmark_results/real_taxon_mode_audit
          if-no-files-found: error
