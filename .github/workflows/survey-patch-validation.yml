name: Survey patch validation

on:
  pull_request:
    paths:
      - "benchmarks/survey_patch_validation.py"
      - "docs/survey_patch_validation_protocol.md"
      - ".github/workflows/survey-patch-validation.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: python -m pip install -e .
      - name: Create leakage-free smoke data
        run: |
          mkdir -p benchmark_results/survey_patch_smoke
          cat > /tmp/candidate_patches.csv <<'CSV'
          patch_id,priority_score,nearest_occurrence_distance,environmental_similarity,travel_cost,accessible
          p01,0.99,8,0.92,1.0,true
          p02,0.95,20,0.90,1.2,true
          p03,0.90,3,0.70,0.9,true
          p04,0.80,30,0.82,1.1,true
          p05,0.70,2,0.60,1.0,true
          p06,0.60,5,0.55,1.3,true
          p07,0.50,1,0.50,0.8,true
          p08,0.40,4,0.45,1.0,true
          p09,0.30,6,0.40,1.4,true
          p10,0.20,7,0.35,1.0,true
          p11,0.10,9,0.30,1.0,true
          p12,0.05,10,0.25,1.0,true
          CSV
          cat > /tmp/survey_outcomes.csv <<'CSV'
          patch_id,surveyed,detected,effort
          p01,true,true,1
          p02,true,true,1
          p03,true,false,1
          p04,true,true,1
          p05,true,false,1
          p06,true,false,1
          p07,true,false,1
          p08,true,false,1
          p09,true,false,1
          p10,true,false,1
          p11,true,false,1
          p12,true,false,1
          CSV
      - name: Run outcome validator
        run: |
          python benchmarks/survey_patch_validation.py \
            --candidates /tmp/candidate_patches.csv \
            --outcomes /tmp/survey_outcomes.csv \
            --primary-k 4 \
            --random-draws 500 \
            --output benchmark_results/survey_patch_smoke
      - name: Check outputs and gate
        run: |
          test -s benchmark_results/survey_patch_smoke/survey_patch_metrics.csv
          test -s benchmark_results/survey_patch_smoke/survey_patch_eligible.csv
          test -s benchmark_results/survey_patch_smoke/survey_patch_decision.json
          python - <<'PY'
          import json
          p = 'benchmark_results/survey_patch_smoke/survey_patch_decision.json'
          d = json.load(open(p))
          assert d['eligible_surveyed_patches'] == 12
          assert d['passes_outcome_gate'] is True
          PY
      - name: Upload outputs
        uses: actions/upload-artifact@v4
        with:
          name: survey-patch-validation-smoke
          path: benchmark_results/survey_patch_smoke
