name: Mode separation comparators

on:
  pull_request:
    paths:
      - "benchmarks/mode_separation_comparators.py"
      - ".github/workflows/mode-separation-comparators.yml"
      - "src/eog/**"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: python -m pip install -e .
      - name: Run comparator benchmark
        run: |
          python benchmarks/mode_separation_comparators.py \
            --repeats 20 \
            --seed 20261001 \
            --output benchmark_results/mode_comparators
      - name: Check outputs
        run: |
          test -s benchmark_results/mode_comparators/mode_comparator_results.csv
          test -s benchmark_results/mode_comparators/mode_comparator_auc.csv
          test -s benchmark_results/mode_comparators/mode_comparator_decision.json
      - name: Upload outputs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mode-separation-comparators
          path: benchmark_results/mode_comparators
          if-no-files-found: error
