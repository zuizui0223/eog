name: PR51 diagnostic

on:
  pull_request:
  push:
    branches:
      - agent/issue-51-survey-priority
  workflow_dispatch:

permissions:
  contents: read

jobs:
  diagnostic:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
      - name: Run diagnostic tests
        continue-on-error: true
        run: pytest tests/test_survey_priority.py -vv > diagnostic.txt 2>&1
      - name: Upload diagnostic
        uses: actions/upload-artifact@v4
        with:
          name: pr51-diagnostic
          path: diagnostic.txt
