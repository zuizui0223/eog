name: Real-taxon pilot validation

on:
  pull_request:
    paths:
      - "benchmarks/real_taxon_pilot.py"
      - "benchmarks/real_taxon_pilot_manifest.csv"
      - "docs/real_taxon_pilot_protocol.md"
      - ".github/workflows/real-taxon-pilot.yml"
      - "src/eog/**"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: python -m pip install -e ".[raster]"
      - name: Run frozen real-taxon pilot
        run: |
          python benchmarks/real_taxon_pilot.py \
            --manifest benchmarks/real_taxon_pilot_manifest.csv \
            --output benchmark_results/real_taxon_pilot \
            --seed 20260815 \
            --minimum-n 60 \
            --minimum-eligible 4 \
            --null-draws 40 \
            --stability-repeats 20
      - name: Check outputs
        run: |
          test -s benchmark_results/real_taxon_pilot/pair_summary.csv
          test -s benchmark_results/real_taxon_pilot/thinning_stability.csv
          test -s benchmark_results/real_taxon_pilot/pilot_gate.json
      - name: Upload outputs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: real-taxon-pilot
          path: benchmark_results/real_taxon_pilot
          if-no-files-found: error
