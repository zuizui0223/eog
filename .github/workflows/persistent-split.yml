name: Persistent split benchmark

on:
  pull_request:
    paths:
      - "benchmarks/persistent_split_benchmark.py"
      - "docs/persistent_split_protocol.md"
      - ".github/workflows/persistent-split.yml"
      - "src/eog/**"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: python -m pip install -e .
      - name: Run persistent split benchmark
        run: |
          python benchmarks/persistent_split_benchmark.py \
            --repeats 12 \
            --subsamples 20 \
            --seed 20260825 \
            --output benchmark_results/persistent_split
      - name: Check outputs
        run: |
          test -s benchmark_results/persistent_split/persistent_split_results.csv
          test -s benchmark_results/persistent_split/persistent_split_auc.csv
          test -s benchmark_results/persistent_split/persistent_split_rates.csv
          test -s benchmark_results/persistent_split/persistent_split_decision.json
      - name: Upload outputs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: persistent-split-benchmark
          path: benchmark_results/persistent_split
          if-no-files-found: error
