name: EOG robustness audit

on:
  pull_request:
    paths:
      - "src/eog/**"
      - "benchmarks/robustness_audit.py"
      - ".github/workflows/robustness-audit.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  robustness-audit:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: python -m pip install -e ".[dev]"
      - name: Run audit
        run: |
          python benchmarks/robustness_audit.py \
            --repeats 50 \
            --seed 20260801 \
            --output benchmark_results/robustness_audit
      - name: Check auditable outputs
        run: |
          test -s benchmark_results/robustness_audit/robustness_repeat_results.csv
          test -s benchmark_results/robustness_audit/robustness_cell_summary.csv
          test -s benchmark_results/robustness_audit/robustness_summary.json
      - name: Upload audit artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eog-robustness-audit
          path: benchmark_results/robustness_audit
          if-no-files-found: error
