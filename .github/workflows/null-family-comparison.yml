name: Connected-null family comparison

on:
  pull_request:
    paths:
      - "benchmarks/null_family_comparison.py"
      - "docs/null_family_comparison_protocol.md"
      - ".github/workflows/null-family-comparison.yml"
      - "src/eog/**"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: python -m pip install -e .
      - name: Run null-family comparison
        run: |
          python benchmarks/null_family_comparison.py \
            --repeats 12 \
            --null-draws 24 \
            --seed 20260820 \
            --output benchmark_results/null_family_comparison
      - name: Check outputs
        run: |
          test -s benchmark_results/null_family_comparison/null_family_results.csv
          test -s benchmark_results/null_family_comparison/null_family_cell_summary.csv
          test -s benchmark_results/null_family_comparison/null_family_summary.csv
          test -s benchmark_results/null_family_comparison/null_family_decision.json
      - name: Upload outputs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: connected-null-family-comparison
          path: benchmark_results/null_family_comparison
          if-no-files-found: error
